name: LH Busro 좌석 체크

on:
  schedule:
    - cron: '*/15 21-23 * * *'
    - cron: '*/15 0-12 * * *'
  workflow_dispatch:

jobs:
  check-seats:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: pip 캐시
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Playwright 캐시
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: 패키지 설치
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps

      - name: 스크립트 실행
        env:
          BUS_USERNAME: ${{ secrets.BUS_USERNAME }}
          BUS_PASSWORD: ${{ secrets.BUS_PASSWORD }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          LH_BUSRO_HEADLESS: "true"
          LH_BUSRO_DIRECTION: ${{ secrets.LH_BUSRO_DIRECTION }}
          LH_BUSRO_LINE_KEYWORD: ${{ secrets.LH_BUSRO_LINE_KEYWORD }}
          LH_BUSRO_DISPATCH_TIME_KW: ${{ secrets.LH_BUSRO_DISPATCH_TIME_KW }}
          LH_BUSRO_BOARD_STATION_KW: ${{ secrets.LH_BUSRO_BOARD_STATION_KW }}
        run: python main.py
